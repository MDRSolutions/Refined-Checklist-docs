# Place this in: <docs-repo>/.github/workflows/sync-issues-to-private.yml
#
# Fires when a new issue is opened in the public docs repo, and creates a
# mirrored issue in the private repo where actual development happens.
# Also comments back on the original issue with a status note.
#
# Required secret in the DOCS repo settings:
#   ISSUE_SYNC_TOKEN - a fine-grained PAT with:
#     - Read access to Issues on the docs repo
#     - Read & Write access to Issues on the private repo
#   (Fine-grained PATs let you scope this to exactly two repos.)

name: Sync new issue to private repo

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number in the docs repo to mirror'
        required: true
        type: string

# Adjust these two values for your repos
env:
  PRIVATE_OWNER: MDRSolutions   # org/user that owns the private repo
  PRIVATE_REPO: Refined-Checklist    # private repo name

jobs:
  mirror-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create mirrored issue in private repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISSUE_SYNC_TOKEN }}
          script: |
            let original = context.payload.issue;
 
            // If triggered manually via workflow_dispatch, fetch the issue by number instead
            if (!original) {
              const rawInput = context.payload.inputs && context.payload.inputs.issue_number;
              console.log('Raw issue_number input:', rawInput);
 
              const issueNumber = parseInt(rawInput, 10);
              if (!issueNumber || isNaN(issueNumber)) {
                core.setFailed(`issue_number input is missing or not a number: "${rawInput}"`);
                return;
              }
 
              const { data } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              original = data;
            }
 
            if (!original) {
              core.setFailed('Could not resolve an issue to mirror.');
              return;
            }
 
            const body = [
              `_Mirrored from ${context.repo.owner}/${context.repo.repo}#${original.number}_`,
              '',
              '---',
              '',
              original.body || '_(no description provided)_'
            ].join('\n');
 
            const created = await github.rest.issues.create({
              owner: process.env.PRIVATE_OWNER,
              repo: process.env.PRIVATE_REPO,
              title: original.title,
              body: body,
              labels: ['from-docs']
            });
 
            // Comment back on the original public issue, without revealing repo details
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: original.number,
              body: `Thanks for the report! This has been logged internally for tracking (ref: private#${created.data.number}).`
            });
 
            // Optional: add a label on the docs issue so you can see at a glance it's synced
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: original.number,
              labels: ['synced']
            });
